# proxy 相关
Dingyue: &Dingyue
  # 必须选择一种类型，最好select
  # type类型有 select url-test fallback load-balance
  type: select
  # type: url-test
  include-all: true
  lazy: true
  udp: true
  use:
    - 本地配置
    # - 米贝节点分享
    # - 订阅分享中心
    # - 电报ZDYZ2
    # - ZDYZ2_5623
# 全局配置 
mixed-port: 7890
socks-port: 7891
port: 7892
# 安卓手机需要禁用 redir-port和tproxy
# 关闭 REDIRECT
# redir-port: 0
# 关闭 TPROXY
# tproxy-port: 0
redir-port: 7893
tproxy-port: 7894
# rule/ global/ direct
mode: rule
# silent/ error/ warning/ info/ debug
log-level: warning
# ipv6: true
ipv6: false
allow-lan: true
# allow-lan: false
bind-address: "*"
# udp: true
# 开启统一延迟时，会进行两次延迟测试，以消除连接握手等带来的不同类型节点的延迟差异，可选值 true/false
unified-delay: true
# TCP 并发，可选值 true/false
tcp-concurrent: true
# 控制是否让 Clash 去匹配进程，always 开启，强制匹配所有进程，strict 默认，由 Clash 判断是否开启，off 不匹配进程，推荐在路由器上使用此模式
# always/strict/off
# 路由器 off
# find-process-mode: strict
find-process-mode: off
# 全局 TLS 指纹，优先低于 proxy 内的 client-fingerprint，目前支持开启 TLS 传输的 TCP/grpc/WS/HTTP , 支持协议有 VLESS,Vmess 和 trojan
global-client-fingerprint: chrome
# 连接空闲后多久发送探测包
keep-alive-idle: 600
# TCP Keep Alive 间隔,单位分钟
keep-alive-interval: 15
# # 禁用保持活跃探测, 在 Android 默认为 true
disable-keep-alive: false

# 缓存配置
profile:
  # 持久化策略组的选择
  # 储存 API 对策略组的选择，以供下次启动时使用
  store-selected: true
  # 持久化缓存fake-ip映射表
  # 缓存 fake-ip 映射表，域名再次发生连接时，使用原有映射地址
  store-fake-ip: true
# 允许连接的 IP 地址段
lan-allowed-ips:
  - 0.0.0.0/0
  - ::/0
# 禁止连接的 IP 地址段
lan-disallowed-ips: []
# # http(s)/socks/mixed代理的用户验证的账号密码
# authentication:
#   - "mihomo:963."
#   - "nikki:963."
# skip-auth-prefixes:
#   - 127.0.0.1/32
#   - ::1/128
#   - 192.168.0.0/16

# 入站  
tun:
# 路由器 true
  # 启用 tun
  enable: true
  # enable: false
  # 路由器
  device: Mihomo
  # system/gvisor/mixed
  # https://wiki.metacubex.one/config/inbound/tun/?h=android#stack
  stack: system
  # 自动设置全局路由，可以自动将全局流量路由进入 tun 网卡
  auto-route: true
  # 是否自动重定向网络流量
  auto-redirect: false
  # 自动选择流量出口接口，多出口网卡同时连接的设备建议手动指定出口网卡
  auto-detect-interface: true
  # dns 劫持，将匹配到的连接导入内部 dns 模块，不书写协议则为 udp://
  dns-hijack:
    - any:53
    # - tcp://any:53
  route-exclude-address: []
  mtu: 1500
  # 仅支持 Linux，自动配置 iptables/nftables 以重定向 TCP 连接，需要auto-route已启用
  # 在 Android 中：
  # 仅转发本地 IPv4 连接。要通过热点或中继共享您的 VPN 连接，请使用 VPNHotspot。
  # 在 Linux 中：
  # 带有 auto-route 的 auto-redirect 现在可以在路由器上按预期工作，无需干预。
  strict-route: true
  gso: true
  gso-max-size: 65536
  endpoint-independent-nat: false
# =============================== DNS 配置 ===============================
# DNS 解析配置，决定了域名解析方式和缓存策略
dns:
  # 关闭将使用系统 DNS
  enable: true
  # IPV6解析开关；如果为false，将返回ipv6结果为空
  # ipv6: true
  ipv6: false
  # DNS 监听地址
  listen: '[::]:1053'
  # listen: '0.0.0.0:1053'
  # use-hosts: false
  use-hosts: true
  use-system-hosts: false
  # prefer-h3: true
  prefer-h3: false
  # DNS请求遵循规则路由，需配置 proxy-server-nameserver
  respect-rules: true
  # cache-algorithm: arc
  # cache-size: 4096
  # 模式：redir-host或fake-ip
  # enhanced-mode: redir-host
  enhanced-mode: fake-ip
  # Fake-IP 解析地址池
  fake-ip-range: 28.0.0.1/8
  # fake-ip-range: 198.18.0.0/16
  fake-ip-filter-mode: blacklist
  # Fake-ip 过滤，列表中的域名返回真实IP
  fake-ip-filter:
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - geosite:private
    - geosite:connectivity-check
    - geosite:category-games
    - geosite:cn
    - RULE-SET:aa-fakeip
    - +.kyarucloud.moe
    - +.dynv6.com
    # - "*"
  # # 解析非IP的dns用的dns服务器，只支持纯IP, 可为加密 DNS
  default-nameserver:
    - 'tls://223.5.5.5'
    - 'tls://119.29.29.29'
    # - 222.222.222.222
  # 默认DNS服务器，支持udp/tcp/dot/doh/doq
  nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
    # - https://dns.google/dns-query
    # # 电信
    # - 222.222.222.222
    # # 360
    # - 101.226.4.6
    # - 218.30.118.6
    # # 百度
    # - 180.76.76.76
  # 代理节点域名解析服务器，仅用于解析代理节点的域名
  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
    - "https://dns.google/dns-query"
  direct-nameserver:
    # - system
    - "tls://223.5.5.5"
    - "tls://119.29.29.29"
  direct-nameserver-follow-policy: true
  # direct-nameserver-follow-policy: false
  # # 指定域名查询的解析服务器，可使用 geosite, 优先于 nameserver/fallback 查询
  nameserver-policy:
    "geosite:cn,private":
      - https://223.5.5.5/dns-query
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geo:cn":
      - https://223.5.5.5/dns-query
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
  fallback:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - +.google.com
      - +.facebook.com
      - +.youtube.com
hosts:
  localhost:
    - 127.0.0.1
  # mywifi.com:
  #   - 127.0.0.1
  dns.alidns.com:
    - 223.5.5.5
    - 223.6.6.6
    # - "2400:3200:baba::1"
    # - "2400:3200::1"
  doh.pub:
    - 120.53.53.53
    # - 1.12.12.21
    # - "2402:4e00::"
  dns.google:
    - 8.8.8.8
    - 8.8.4.4
    # - "2001:4860:4860::8888"
    # - "2001:4860:4860::8844"
  nikkinikki.pages.dev:
    - 172.66.44.100
    - 172.66.47.156
    # - "2606:4700:310c:0:0:0:ac42:2f9c"
    # - "2606:4700:310c:0:0:0:ac42:2c64"
# 域名嗅探配置
# 域名嗅器,通过读取握手包内的域名字段,将IP还原成域名,有效解决Mapping机制的短板
sniffer:
  # 是否启用sniffer
  enable: true
  # enable: false
  ## 对所有未获取到域名的流量进行强制嗅探
  parse-pure-ip: true
  ## 对 redir-host 类型识别的流量进行强制嗅探
  ## 如：Tun、Redir 和 TProxy 并 DNS 为 redir-host 皆属于
  force-dns-mapping: true
  # 是否使用嗅探结果作为实际访问，默认为 true
  # 全局配置，优先级低于 sniffer.sniff 实际配置
  # override-destination: true
  override-destination: false
  sniff:
    HTTP:
      # ports字段，表示端口范围。示例：ports: [80, 8080-8880]
      ports: [80, 443, 8080-8880]
      # override-destination字段（可选），用于覆盖全局override-destination设置
      override-destination: true
      # override-destination: false
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  # 需要强制嗅探的域名（默认情况下只对IP进行嗅探）
  force-domain:
    # - '+' # Force all domain to use sniffer
    - +.v2ex.com
    - +.github.com
    - +.google.com
    - +.youtube.com
    - +.netflix.com
    - +.nflxvideo.net
    - +.amazonaws.com
    - +.media.dssott.com
  # 对嗅探结果进行跳过
  # 需要跳过嗅探的域名。主要解决部分站点sni字段非域名，导致嗅探结果异常的问题，如米家设备Mijia Cloud
  skip-domain:
    - +.push.apple.com
    - Mijia Cloud
    - dlg.io.mi.com
    - +.apple.com
    - +.baidu.com
    - +.pages.dev
    - +.nikkinikki.pages.dev
    - "*.wechat.com"
    - "*.qpic.cn"
    - "*.qq.com"
    - "*.wechatapp.com"
    - "*.kyarucloud.moe"
    # # vivo
    - +.vivo.com.cn
    - "*.vivox.com"
    # # 向日葵服务
    - "+.oray.com"
    - "+.sunlogin.net"
  # skip-src-address: # 对于来源ip跳过嗅探
  #   - 192.168.0.3/32
  # skip-dst-address: # 对于目标ip跳过嗅探
  #   - 192.168.0.3/32
ntp:
  enable: true
  # 是否同步至系统时间，需要 root/管理员权限
  write-to-system: false
